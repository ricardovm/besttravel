quarkus.log.category."dev.ricardovm".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{2.}] (%t) %s%e%n
quarkus.http.access-log.pattern="...traceId=%{X,traceId} spanId=%{X,spanId}"

%dev.quarkus.rest-client.car-rental-company-api.url=http://localhost:8081
quarkus.rest-client.car-rental-company-api.scope=jakarta.inject.Singleton

mp.messaging.incoming.quote-requests.failure-strategy=dead-letter-queue
mp.messaging.incoming.quote-requests.dead-letter-queue.topic=quote-requests-dlq

mp.messaging.incoming.booking-requests.failure-strategy=dead-letter-queue
mp.messaging.incoming.booking-requests.dead-letter-queue.topic=booking-requests-dlq
