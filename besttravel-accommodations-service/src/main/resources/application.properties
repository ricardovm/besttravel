quarkus.log.category."dev.ricardovm".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{2.}] (%t) %s%e%n
quarkus.http.access-log.pattern="...traceId=%{X,traceId} spanId=%{X,spanId}"

%dev.quarkus.rest-client.accommodation-company-api.url=http://localhost:8081
quarkus.rest-client.accommodation-company-api.scope=jakarta.inject.Singleton

mp.messaging.incoming.accommodation-quote-requests.failure-strategy=dead-letter-queue
mp.messaging.incoming.accommodation-quote-requests.dead-letter-queue.topic=accommodation-quote-requests-dlq

mp.messaging.incoming.accommodation-booking-requests.failure-strategy=dead-letter-queue
mp.messaging.incoming.accommodation-booking-requests.dead-letter-queue.topic=accommodation-booking-requests-dlq

mp.messaging.incoming.accommodation-quote-requests-dlq.connector=smallrye-kafka
mp.messaging.incoming.accommodation-quote-requests-dlq.topic=accommodation-quote-requests-dlq

mp.messaging.incoming.accommodation-booking-requests-dlq.connector=smallrye-kafka
mp.messaging.incoming.accommodation-booking-requests-dlq.topic=accommodation-booking-requests-dlq
